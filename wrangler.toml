name = "astro-vue-cf-starter"
compatibility_date = "2026-06-01"
pages_build_output_dir = "dist"

# R2 bucket for uploaded media (the MEDIA binding used by /api/upload).
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "listings-media"

# Non-secret vars. GITHUB_TOKEN is set separately as a secret:
#   wrangler pages secret put GITHUB_TOKEN
[vars]
ENVIRONMENT = "production"
GITHUB_REPO = "dsottimano/astro-vue-cf-starter"
GITHUB_BRANCH = "main"
CF_ACCESS_TEAM_DOMAIN = "yourteam.cloudflareaccess.com"
CF_ACCESS_AUD = "replace-with-access-application-aud"
# Comma-separated numeric Telegram user IDs allowed to drive the bot.
TELEGRAM_ALLOWED_IDS = "123456789"

# KV namespace for Telegram wizard session state.
# Create with: wrangler kv namespace create SESSIONS
[[kv_namespaces]]
binding = "SESSIONS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
